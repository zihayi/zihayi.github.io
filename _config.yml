title: Personal Tech Blog
description: Notes, articles, and engineering thoughts.
lang: zh-CN
timezone: Asia/Shanghai

# For a user site repo named <username>.github.io, keep baseurl empty.
# For a project site, set baseurl to "/repo-name".
baseurl: ""
url: ""

markdown: kramdown
permalink: /posts/:year/:month/:day/:title/

collections:
  notes:
    output: true
    permalink: /notes/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: notes
    values:
      layout: note

exclude:
  - README.md
