<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="{{ '/' | relative_url }}">首页</a>
        <a href="{{ '/posts/' | relative_url }}">文章</a>
        <a href="{{ '/notes/' | relative_url }}">笔记</a>
        <a href="{{ '/about/' | relative_url }}">关于</a>
      </nav>
    </header>

    <main class="page-shell">
      {{ content }}
    </main>

    <footer class="site-footer">
      <span>© {{ site.time | date: '%Y' }} {{ site.title }}</span>
      <span>网站更新：{{ site.time | date: '%Y-%m-%d %H:%M' }}</span>
      <span>Powered by GitHub Pages</span>
    </footer>
  </body>
</html>
