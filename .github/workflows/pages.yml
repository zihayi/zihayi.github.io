name: Deploy Jekyll site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUNDLE_PATH: ${{ runner.temp }}/bundle
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare relative assets
        shell: pwsh
        run: |
          ./.scripts/sync-relative-assets.ps1
          Get-ChildItem -LiteralPath _posts -Directory -Filter "*.assets" | Remove-Item -Recurse -Force
          if (Test-Path -LiteralPath _notes) {
            Get-ChildItem -LiteralPath _notes -Directory -Filter "*.assets" | Remove-Item -Recurse -Force
          }

      - name: Build with Jekyll
        run: bundle exec jekyll build --trace

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
